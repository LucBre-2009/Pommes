<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasse</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

button{
font-size:20px;
padding:20px;
margin:10px;
width:200px;
}

#extras{
display:none;
background:white;
padding:20px;
border:2px solid black;
position:fixed;
top:30%;
left:40%;
}
</style>
</head>

<body>

<h1>Kasse</h1>

<button onclick="bestellen('Pommes klein')">Pommes klein</button>
<button onclick="bestellen('Pommes groß')">Pommes groß</button>

<br><br>

<button onclick="extrasPopup()">Extras</button>

<div id="extras">
<h3>Extras</h3>

<label><input type="checkbox" id="mayo"> Mayonnaise</label><br>
<label><input type="checkbox" id="ketchup"> Ketchup</label><br>
<label><input type="checkbox" id="pommessoße"> Pommessoße</label><br><br>

<button onclick="bestellungMitExtras()">Bestellen</button>
<button onclick="closeExtras()">Abbrechen</button>
</div>

<script>

function extrasPopup(){
document.getElementById("extras").style.display="block"
}

function closeExtras(){
document.getElementById("extras").style.display="none"
}

function bestellen(item){

let orders = JSON.parse(localStorage.getItem("orders")) || []

orders.push({
item:item,
extras:[],
time:Date.now()
})

localStorage.setItem("orders", JSON.stringify(orders))

alert("Bestellung gesendet")

}

function bestellungMitExtras(){

let extras=[]

if(document.getElementById("mayo").checked) extras.push("Mayo")
if(document.getElementById("ketchup").checked) extras.push("Ketchup")
if(document.getElementById("pommessoße").checked) extras.push("Pommessoße")

let orders = JSON.parse(localStorage.getItem("orders")) || []

orders.push({
item:"Pommes",
extras:extras,
time:Date.now()
})

localStorage.setItem("orders", JSON.stringify(orders))

closeExtras()

alert("Bestellung gesendet")

}

</script>

</body>
</html>
