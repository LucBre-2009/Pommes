
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasse</title>
<link rel="icon" href="favicon.png">
<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}
button{
font-size:28px;
padding:20px;
margin:20px;
width:320px;
height:120px;
}
#popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
text-align:left;
}
#popup label{
display:block;
margin:10px 0;
font-size:20px;
}
</style>
</head>
<body>
<h1>🧾 Kasse</h1>

<button onclick="openPopup('Pommes klein')">Pommes klein</button>
<button onclick="openPopup('Pommes groß')">Pommes groß</button>

<div id="popup">
<h2 id="title"></h2>
<label><input type="checkbox" id="mayo"> Mayonnaise</label>
<label><input type="checkbox" id="ketchup"> Ketchup</label>
<label><input type="checkbox" id="sosse"> Pommes Soße</label>
<br>
<button onclick="sendOrder()">Bestellen</button>
<button onclick="closePopup()">Abbrechen</button>
</div>

<script>
let currentItem=""
function openPopup(item){
currentItem=item
document.getElementById("title").innerText=item
document.getElementById("popup").style.display="block"
}
function closePopup(){
document.getElementById("popup").style.display="none"
document.getElementById("mayo").checked=false
document.getElementById("ketchup").checked=false
document.getElementById("sosse").checked=false
}
function sendOrder(){
let extras=[]
if(document.getElementById("mayo").checked) extras.push("Mayo")
if(document.getElementById("ketchup").checked) extras.push("Ketchup")
if(document.getElementById("sosse").checked) extras.push("Pommessoße")
let orders = JSON.parse(localStorage.getItem("orders")) || []
orders.push({item:currentItem,extras:extras,id:Date.now()})
localStorage.setItem("orders",JSON.stringify(orders))
document.getElementById("popup").style.display="none"
}
</script>
</body>
</html>
