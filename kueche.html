<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Küche</title>

<style>

body{
font-family:Arial;
background:#222;
color:white;
text-align:center;
}

.order{
background:#333;
padding:20px;
margin:10px;
font-size:22px;
}

</style>

</head>

<body>

<h1>Küche</h1>

<div id="orders"></div>

<script>

function loadOrders(){

let orders = JSON.parse(localStorage.getItem("orders")) || []

let container = document.getElementById("orders")

container.innerHTML=""

orders.forEach(o => {

let div = document.createElement("div")
div.className="order"

let extras = ""

if(o.extras.length>0){
extras = " | Extras: " + o.extras.join(", ")
}

div.innerHTML = o.item + extras

container.appendChild(div)

})

}

setInterval(loadOrders,1000)

</script>

</body>
</html>
