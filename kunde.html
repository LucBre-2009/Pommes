
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Speisekarte</title>
<link rel="icon" href="favicon.png">
<style>
body{
font-family:Arial;
text-align:center;
background:#fffbe6;
}
h1{color:#d35400;margin-top:20px;}
.menu-item{
background:#ffe0b2;
padding:20px;
margin:20px;
border-radius:15px;
font-size:24px;
display:inline-block;
width:250px;
}
.menu-item img{
width:150px;
height:auto;
margin-bottom:10px;
}
.menu-item p{
margin:0;
font-size:22px;
font-weight:bold;
color:#333;
}
</style>
</head>
<body>
<h1>🍟 Speisekarte</h1>

<div class="menu-item">
<img src="pommes-klein .png" alt="Pommes klein">
<p>Pommes klein</p>
</div>

<div class="menu-item">
<img src="pommes-gross .png" alt="Pommes groß">
<p>Pommes groß</p>
</div>

<div class="menu-item">
<img src="mayo .png" alt="Mayonnaise">
<p>Mayonnaise</p>
</div>

<div class="menu-item">
<img src="ketchup .png" alt="Ketchup">
<p>Ketchup</p>
</div>

<div class="menu-item">
<img src="sosse .png" alt="Pommes Soße">
<p>Pommes Soße</p>
</div>

</body>
</html>
