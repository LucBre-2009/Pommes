<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Speisekarte</title>
<link rel="icon" href="favicon.png">

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#fffbe6;
  margin:0;
  padding:0;
  overflow:hidden; /* verhindert Scrollen */
}

h1{
  color:#d35400;
  margin:15px 0;
  font-size:32px;
}

.section{
  margin-top:15px;
}

.menu-item{
  background:#ffe0b2;
  padding:12px;
  margin:8px;
  border-radius:12px;
  font-size:18px;
  display:inline-block;
  width:160px;
  vertical-align:top;
}

.menu-item img{
  width:100px;
  height:auto;
  margin-bottom:5px;
}

.menu-item p{
  margin:0;
  font-size:16px;
  font-weight:bold;
  color:#333;
}
</style>
</head>

<body>

<h1>🍟 Speisekarte</h1>

<!-- Pommes Menü -->
<div class="section">
  <h2>Pommes</h2>
  <div class="menu-item">
    <img src="pommes-klein.png" alt="Pommes klein">
    <p>Pommes klein</p>
  </div>
  <div class="menu-item">
    <img src="pommes-gross.png" alt="Pommes groß">
    <p>Pommes groß</p>
  </div>
</div>

<!-- Extras -->
<div class="section">
  <h2>Extras</h2>
  <div class="menu-item">
    <img src="mayo.png" alt="Mayonnaise">
    <p>Mayonnaise</p>
  </div>
  <div class="menu-item">
    <img src="ketchup.png" alt="Ketchup">
    <p>Ketchup</p>
  </div>
  <div class="menu-item">
    <img src="sosse.png" alt="Pommes Soße">
    <p>Pommes Soße</p>
  </div>
</div>

</body>
</html>
